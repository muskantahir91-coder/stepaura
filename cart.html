<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — Step Aura</title>
  <meta name="description" content="Review your cart and check out securely with Step Aura." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- AURA ANIMATED BACKGROUND -->
  <div id="aura-bg">
    <div class="aura-orb aura-orb-1"></div>
    <div class="aura-orb aura-orb-2"></div>
    <div class="aura-orb aura-orb-3"></div>
    <div class="aura-orb aura-orb-4"></div>
    <div class="aurora-band aurora-band-1"></div>
    <div class="aurora-band aurora-band-2"></div>
    <div class="aurora-band aurora-band-3"></div>
    <canvas id="aura-canvas"></canvas>
    <div id="aura-grain"></div>
  </div>

  <div id="navbar-mount"></div>

  <header class="page-head">
    <div class="container">
      <div class="uppercase-label">Your Bag</div>
      <h1>Cart & Checkout</h1>
    </div>
  </header>

  <main class="container" id="cartMain">
    <!-- Filled by JS -->
  </main>

  <div id="footer-mount"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    mountShell("");

    function render() {
      const main = document.getElementById("cartMain");
      const items = Cart.items();
      if (items.length === 0) {
        main.innerHTML = `
          <div class="empty-state" style="padding:80px 20px;">
            <div style="font-size:64px; margin-bottom:16px;">🛍️</div>
            <h2 class="font-display" style="font-size:32px; margin-bottom:8px;">Your bag is empty</h2>
            <p class="muted" style="margin-bottom:24px;">Looks like you haven't added anything yet.</p>
            <a class="btn btn-primary" href="shop.html">Continue Shopping →</a>
          </div>`;
        return;
      }

      const subtotal = Cart.total();
      const shipping = subtotal >= 5000 ? 0 : 250;
      const total = subtotal + shipping;
      const user = Auth.user();

      main.innerHTML = `
        <div class="cart-grid">
          <div>
            ${items.map(it => {
              const p = PRODUCTS.find(p => p.id === it.id);
              if (!p) return "";
              return `
                <div class="cart-item">
                  <img src="${p.image}" alt="${p.name}" />
                  <div>
                    <div class="muted" style="font-size:11px; letter-spacing:0.15em; text-transform:uppercase;">${p.subcategory}</div>
                    <h4>${p.name}</h4>
                    <div class="price" style="font-size:16px; margin-top:4px;">${formatPKR(p.price)}</div>
                    <div class="qty-row">
                      <button class="qty-btn" onclick="changeQty('${p.id}', ${it.qty - 1})">−</button>
                      <span style="min-width:24px; text-align:center;">${it.qty}</span>
                      <button class="qty-btn" onclick="changeQty('${p.id}', ${it.qty + 1})">+</button>
                      <button class="remove-btn" style="margin-left:12px;" onclick="removeItem('${p.id}')">Remove</button>
                    </div>
                  </div>
                  <div class="price">${formatPKR(p.price * it.qty)}</div>
                </div>`;
            }).join("")}
          </div>

          <div class="summary">
            <h3>Order summary</h3>
            <div class="row"><span class="muted">Subtotal</span><span>${formatPKR(subtotal)}</span></div>
            <div class="row"><span class="muted">Shipping</span><span>${shipping === 0 ? "Free" : formatPKR(shipping)}</span></div>
            <div class="row total"><span>Total</span><span>${formatPKR(total)}</span></div>

            ${user
              ? `<div style="margin-top:16px; padding:14px; background:var(--bg-soft); border-radius:12px; font-size:13px;">
                   <strong>Delivering to:</strong><br/>${user.name}<br/>
                   <span class="muted">${user.address || "Address on file"} · ${user.phone || ""}</span>
                 </div>
                 <button class="btn btn-accent btn-block" style="margin-top:16px;" onclick="placeOrder()">Place Order</button>
                 <a class="btn btn-outline btn-block" style="margin-top:8px;" href="shop.html">Continue Shopping</a>`
              : `<div style="margin-top:16px; padding:14px; background:var(--bg-soft); border-radius:12px; font-size:13px;">
                   You must sign in to place an order.
                 </div>
                 <a class="btn btn-accent btn-block" style="margin-top:16px;" href="auth.html?next=cart.html">Sign In to Checkout →</a>`}
          </div>
        </div>`;
    }

    function changeQty(id, qty) {
      if (qty < 1) { Cart.remove(id); } else { Cart.setQty(id, qty); }
      render();
    }
    function removeItem(id) { Cart.remove(id); render(); }
    async function placeOrder() {
      const user = Auth.user();
      if (!user) { location.href = "auth.html?next=cart.html"; return; }

      const items = Cart.items();
      const subtotal = Cart.total();
      const shipping = subtotal >= 5000 ? 0 : 250;
      const total = subtotal + shipping;

      // Order data banana
      const orderData = {
        customer_name:     user.name,
        customer_email:    user.email,
        customer_phone:    user.phone || "",
        shipping_address:  user.address || "Address not provided",
        payment_method:    "COD",
        user_id:           user.db_id || "",
        items: items.map(it => {
          const p = PRODUCTS.find(p => p.id === it.id);
          return {
            product_id: it.id.replace(/\D/g, "") || 1,
            name:       p ? p.name : it.id,
            price:      p ? p.price : 0,
            quantity:   it.qty
          };
        })
      };

      // Button disable karo
      const btn = document.querySelector(".btn-accent");
      if (btn) { btn.disabled = true; btn.textContent = "Placing order..."; }

      try {
        const res = await fetch("https://stepaura-backend-production.up.railway.app/api/order.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(orderData)
        });
        const data = await res.json();

        if (data.success) {
          Cart.clear();
          document.getElementById("cartMain").innerHTML = `
            <div class="empty-state" style="padding:80px 20px;">
              <div style="font-size:64px; margin-bottom:16px;">✅</div>
              <h2 class="font-display" style="font-size:36px; margin-bottom:8px;">Order placed!</h2>
              <p class="muted">Tumhara order ID hai <strong style="color:var(--primary);">Order #${data.order_id}</strong></p>
              <p class="muted" style="margin:8px 0 24px;">Jald hi delivery ho gi — shukriya Step Aura choose karne ka!</p>
              <a class="btn btn-primary" href="shop.html">Continue Shopping →</a>
            </div>`;
          updateCartCount();
        } else {
          showToast("Order fail hua: " + (data.error || "dobara try karo"));
          if (btn) { btn.disabled = false; btn.textContent = "Place Order"; }
        }
      } catch (err) {
        // Agar backend available nahi — offline mode
        Cart.clear();
        document.getElementById("cartMain").innerHTML = `
          <div class="empty-state" style="padding:80px 20px;">
            <div style="font-size:64px; margin-bottom:16px;">✅</div>
            <h2 class="font-display" style="font-size:36px; margin-bottom:8px;">Order placed!</h2>
            <p class="muted" style="margin:8px 0 24px;">Shukriya! Jald hi rabta kiya jayega.</p>
            <a class="btn btn-primary" href="shop.html">Continue Shopping →</a>
          </div>`;
        updateCartCount();
      }
    }

    render();
  </script>
  <script src="js/aura-bg.js"></script>
</body>
</html>
